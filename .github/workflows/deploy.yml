name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy site to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.NATUREANDNATIONS_WEBSITE_API }}
          CLOUDFLARE_ACCOUNT_ID: f0f92bdb9cdfe5eafbc27dc509009def
        run: npx --yes wrangler@4 pages deploy public --project-name=nature-and-nations --branch=main
